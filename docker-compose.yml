# Local dev path:
#   docker compose up -d        ← auto-loads docker-compose.override.yml.
#   In the dev stage the API runs `node --env-file=.env …` and Next.js loads
#   `.env.local` natively, so each process re-reads the file on every restart.
#   That means editing `apps/api/.env` only needs `docker compose restart api`
#   to take effect — no `--force-recreate` dance.
#
# Prod / smoke path:
#   docker compose -f docker-compose.yml up         ← no override, prod image.
#   The prod CMD (`node dist/index.js`) has no --env-file flag, so to test the
#   production image locally you'd need to either uncomment `env_file:` below
#   or pass env vars directly:
#     docker compose -f docker-compose.yml --env-file apps/api/.env up
#
services:
  api:
    image: cashly-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cashly-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - cashly
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: cashly-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cashly-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_started
    networks:
      - cashly

networks:
  cashly:
    driver: bridge