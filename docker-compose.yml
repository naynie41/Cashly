services:
  api:
    image: cashly-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: cashly-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - apps/api/.env
    networks:
      - cashly
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    image: cashly-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: cashly-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env.local
    environment:
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_started
    networks:
      - cashly

networks:
  cashly:
    driver: bridge